<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System HMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <app-navigation v-if="user"></app-navigation>

        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <app-sidebar v-if="user"></app-sidebar>

                <!-- Main Content -->
                <main :class="user ? 'col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4' : 'col-12'">
                    <transition name="fade" mode="out-in">
                        <div :key="currentView">
                            <!-- Login View -->
                            <login-view v-if="!user && currentView === 'login'"></login-view>

                            <!-- Register View -->
                            <register-view v-if="!user && currentView === 'register'"></register-view>

                            <!-- Admin Dashboard -->
                            <admin-dashboard v-if="user && user.role === 'admin' && currentView === 'dashboard'"></admin-dashboard>

                            <!-- Admin Doctors View -->
                            <admin-doctors-view v-if="user && user.role === 'admin' && currentView === 'doctors'"></admin-doctors-view>

                            <!-- Admin Patients View -->
                            <admin-patients-view v-if="user && user.role === 'admin' && currentView === 'patients'"></admin-patients-view>

                            <!-- Admin Appointments View -->
                            <admin-appointments-view v-if="user && user.role === 'admin' && currentView === 'appointments'"></admin-appointments-view>

                            <!-- Patient Dashboard -->
                            <patient-dashboard v-if="user && user.role === 'patient' && currentView === 'dashboard'"></patient-dashboard>

                            <!-- Patient Appointments View -->
                            <patient-appointments-view v-if="user && user.role === 'patient' && currentView === 'appointments'"></patient-appointments-view>

                            <!-- Doctor Dashboard -->
                            <doctor-dashboard v-if="user && user.role === 'doctor' && (currentView === 'dashboard' || currentView === 'patients')"></doctor-dashboard>
                        </div>
                    </transition>
                </main>
            </div>
        </div>

        <!-- Modals -->
        <transition name="fade">
            <add-doctor-modal v-if="showAddDoctor"></add-doctor-modal>
        </transition>
        
        <transition name="fade">
            <edit-doctor-modal v-if="editingDoc"></edit-doctor-modal>
        </transition>

        <transition name="fade">
            <edit-patient-modal v-if="editingPatient"></edit-patient-modal>
        </transition>

        <transition name="fade">
            <consultation-modal v-if="consultingApp"></consultation-modal>
        </transition>

        <transition name="fade">
            <booking-modal v-if="bookingDoc"></booking-modal>
        </transition>

        <transition name="fade">
            <add-schedule-modal v-if="showAddSlot"></add-schedule-modal>
        </transition>

        <transition name="fade">
            <treatment-history-modal v-if="viewingHistoryPatient"></treatment-history-modal>
        </transition>

        <transition name="fade">
            <search-results-modal v-if="showSearchResults"></search-results-modal>
        </transition>

        <transition name="fade">
            <notification-modal v-if="showNotifications"></notification-modal>
        </transition>

        <transition name="fade">
            <edit-profile-modal v-if="editingProfile"></edit-profile-modal>
        </transition>

    </div>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Logic -->
    <script type="module" src="/static/app.js"></script>
</body>
</html>
